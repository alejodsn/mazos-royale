<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CR Max Deck Generator</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Max Deck Generator</h1>
            <p>Ingresa tu Player Tag para crear mazos con tus cartas nivel 15 y 16.</p>
        </header>

        <section class="search-section">
            <form id="search-form">
                <input type="text" id="player-tag" placeholder="#PLAYERTAG" required autocomplete="off">
                <button type="submit">Generar Mazos</button>
            </form>
            <div id="loading" class="hidden">Buscando cartas al máximo...</div>
            <div id="error-message" class="hidden alert"></div>
        </section>

        <section id="results-section" class="hidden">
            <h2>Tus Combinaciones</h2>
            <div id="decks-grid" class="grid-container">
                <!-- Tarjetas dinámicas se insertarán aquí -->
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
